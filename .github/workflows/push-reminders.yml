name: Rappels push (régie demain)

on:
  schedule:
     - cron: '*/15 * * * *'   # toutes les 15 min (filet de secours ; les formations partent en instantané via le Worker Cloudflare)
  workflow_dispatch: {}
  
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances
        run: npm install
        working-directory: scripts
      - name: Envoyer les rappels
        run: node send-reminders.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
